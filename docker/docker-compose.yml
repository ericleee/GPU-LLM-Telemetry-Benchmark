# Observability stack — Prometheus + Grafana, both containerized.
# The app (exporter :9100, inference server :8000) runs natively on the Windows
# host; these containers scrape it via host.docker.internal.
#
#   docker compose -f docker\docker-compose.yml up -d
#
# Grafana is anonymous-admin with the login form disabled, so opening
# http://localhost:3000 drops you straight onto the provisioned dashboard.

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: telemetry-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=2h"
    extra_hosts:
      - "host.docker.internal:${WIN_HOST_IP:-host-gateway}"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: telemetry-grafana
    # Host port 3001 (not 3000) to avoid colliding with a local Node/Next.js
    # dev server, which defaults to 3000. Grafana still listens on 3000 inside.
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_USERS_DEFAULT_THEME=dark
      - GF_SECURITY_ALLOW_EMBEDDING=true   # let the inference console iframe the panels
    depends_on:
      - prometheus
    extra_hosts:
      - "host.docker.internal:${WIN_HOST_IP:-host-gateway}"
    restart: unless-stopped
